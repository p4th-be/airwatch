{% extends 'airquality/base.html' %}
{% load static %}

{% block title %}Connexion Admin — AirWatch{% endblock %}

{% block content %}
<div class="form-page" style="margin-top:80px;">
    <div class="form-card">
        <h2>Connexion Administrateur</h2>

        {% if messages %}
        {% for msg in messages %}
        <div class="message message-{{ msg.tags }}" style="margin-bottom:16px; position:static; animation:none;">{{ msg }}</div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Nom d'utilisateur</label>
                <input type="text" id="id_username" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Mot de passe</label>
                <input type="password" id="id_password" name="password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Se connecter</button>
                <a href="{% url 'airquality:index' %}" class="btn btn-outline">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
