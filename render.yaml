services:
  - type: web
    name: airwatch-django
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn airwatch_project.wsgi --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: airwatch-db
          property: connectionString

databases:
  - name: airwatch-db
    databaseName: airwatch_db
    user: airwatch_user
    plan: free
